definitions:
  admin.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - customer
        - admin
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  admin.UserResponse:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  bey_internal_shared_response.ApiResponse:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  gin.H:
    additionalProperties: {}
    type: object
  internal_modules_auth.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  internal_modules_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  internal_modules_auth.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      requires_2fa:
        type: boolean
      temp_token:
        type: string
    type: object
  internal_modules_auth.OAuthRedirectResponse:
    properties:
      url:
        type: string
    type: object
  internal_modules_auth.ResendVerificationRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  internal_modules_auth.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  internal_modules_auth.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  internal_modules_auth.TwoFADisableRequest:
    properties:
      backup_code:
        type: string
      code:
        type: string
    type: object
  internal_modules_auth.TwoFAEnableRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  internal_modules_auth.TwoFAEnableResponse:
    properties:
      backup_codes:
        items:
          type: string
        type: array
      success:
        type: boolean
    type: object
  internal_modules_auth.TwoFALoginVerifyRequest:
    properties:
      code:
        type: string
      temp_token:
        type: string
    required:
    - code
    - temp_token
    type: object
  internal_modules_auth.TwoFASetupResponse:
    properties:
      provisioning_uri:
        type: string
      qr_code:
        type: string
      secret:
        type: string
    type: object
  internal_modules_auth.TwoFAVerifyRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  internal_modules_auth.TwoFAVerifyResponse:
    properties:
      valid:
        type: boolean
    type: object
  internal_modules_auth.VerifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  internal_modules_cart.AddToCartRequest:
    properties:
      quantity:
        type: integer
      variant_id:
        type: integer
    required:
    - quantity
    - variant_id
    type: object
  internal_modules_cart.CartItemResponse:
    properties:
      quantity:
        type: integer
      variant_id:
        type: integer
    type: object
  internal_modules_cart.CartResponse:
    properties:
      created_at:
        type: string
      items:
        items:
          $ref: '#/definitions/internal_modules_cart.CartItemResponse'
        type: array
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_modules_cart.UpdateCartItemRequest:
    properties:
      quantity:
        minimum: 0
        type: integer
    required:
    - quantity
    type: object
  internal_modules_inventory.InventoryResponse:
    properties:
      available:
        type: integer
      id:
        type: integer
      product_id:
        type: integer
      quantity:
        type: integer
      reserved:
        type: integer
      updated_at:
        type: string
    type: object
  internal_modules_inventory.UpdateInventoryRequest:
    properties:
      quantity:
        type: integer
    type: object
  internal_modules_orders.CreateOrderItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
      variant_id:
        description: Opcional - si se especifica, usa la variante
        type: integer
    required:
    - product_id
    - quantity
    type: object
  internal_modules_orders.CreateOrderRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_modules_orders.CreateOrderItemRequest'
        minItems: 1
        type: array
      notes:
        type: string
      shipping_address:
        type: string
      user_id:
        type: integer
    required:
    - items
    - shipping_address
    - user_id
    type: object
  internal_modules_orders.OrderItemResponse:
    properties:
      id:
        type: integer
      product_id:
        type: integer
      quantity:
        type: integer
      unit_price:
        type: number
      variant_id:
        type: integer
    type: object
  internal_modules_orders.OrderResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/internal_modules_orders.OrderItemResponse'
        type: array
      notes:
        type: string
      shipping_address:
        type: string
      status:
        type: string
      total_price:
        type: number
      user_id:
        type: integer
    type: object
  internal_modules_payments.CreatePaymentLinkRequest:
    properties:
      amount_in_cents:
        type: integer
      currency:
        description: 'default: "COP"'
        type: string
      description:
        type: string
      expires_at:
        type: string
      order_id:
        type: integer
      redirect_url:
        type: string
      reference:
        type: string
      single_use:
        type: boolean
    required:
    - amount_in_cents
    - currency
    - description
    - reference
    type: object
  internal_modules_payments.CreatePaymentRequest:
    properties:
      amount:
        description: Amount in cents
        type: integer
      currency:
        description: e.g., "COP"
        type: string
      payment_token:
        description: Wompi payment token
        type: string
      redirect_url:
        description: Optional redirect after payment
        type: string
      reference:
        description: Order reference
        type: string
    required:
    - amount
    - currency
    - payment_token
    - reference
    type: object
  internal_modules_payments.PaymentLinkResponse:
    properties:
      amount:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      order_id:
        type: integer
      redirect_url:
        type: string
      reference:
        type: string
      single_use:
        type: boolean
      status:
        type: string
      updated_at:
        type: string
      url:
        type: string
      wompi_link_id:
        type: string
    type: object
  internal_modules_payments.PaymentResponse:
    properties:
      amount:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      id:
        type: integer
      order_id:
        type: integer
      payment_method:
        type: string
      redirect_url:
        type: string
      reference:
        type: string
      status:
        type: string
      updated_at:
        type: string
      wompi_transaction_id:
        type: string
    type: object
  internal_modules_payments.Transaction:
    properties:
      amount_in_cents:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      error_code:
        type: string
      error_message:
        type: string
      id:
        type: string
      payment_method:
        type: string
      reference:
        type: string
      status:
        type: string
      status_detail:
        type: string
      updated_at:
        type: string
    type: object
  internal_modules_payments.WebhookEvent:
    properties:
      data:
        allOf:
        - $ref: '#/definitions/internal_modules_payments.Transaction'
        description: Wompi sends data directly
      event:
        type: string
      event_id:
        type: string
      signature:
        type: string
      timestamp:
        type: string
    type: object
  internal_modules_products.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      parent_id:
        type: integer
      products:
        items:
          $ref: '#/definitions/internal_modules_products.Product'
        type: array
      slug:
        type: string
      subcategories:
        description: Relaciones
        items:
          $ref: '#/definitions/internal_modules_products.Category'
        type: array
    type: object
  internal_modules_products.CreateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      parent_id:
        type: integer
      slug:
        type: string
    required:
    - name
    - slug
    type: object
  internal_modules_products.CreateProductImageRequest:
    properties:
      is_main:
        type: boolean
      product_id:
        type: integer
      sort_order:
        type: integer
      url_image:
        type: string
      variant_id:
        type: integer
    required:
    - product_id
    - url_image
    type: object
  internal_modules_products.CreateProductRequest:
    properties:
      base_price:
        type: number
      brand:
        type: string
      category_id:
        type: integer
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      slug:
        type: string
    required:
    - base_price
    - category_id
    - name
    - slug
    type: object
  internal_modules_products.CreateProductVariantRequest:
    properties:
      color:
        type: string
      price:
        type: number
      product_id:
        type: integer
      size:
        type: string
      sku:
        type: string
      stock:
        type: integer
      weight:
        type: string
    required:
    - color
    - price
    - product_id
    - size
    - sku
    - weight
    type: object
  internal_modules_products.Product:
    properties:
      base_price:
        type: number
      brand:
        type: string
      category:
        allOf:
        - $ref: '#/definitions/internal_modules_products.Category'
        description: Relaciones
      category_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/internal_modules_products.ProductImage'
        type: array
      is_active:
        type: boolean
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
      variants:
        items:
          $ref: '#/definitions/internal_modules_products.ProductVariant'
        type: array
    type: object
  internal_modules_products.ProductImage:
    properties:
      id:
        type: integer
      is_main:
        type: boolean
      product_id:
        type: integer
      sort_order:
        type: integer
      url_image:
        type: string
      variant_id:
        description: Puntero para permitir nulos
        type: integer
    type: object
  internal_modules_products.ProductImageResponse:
    properties:
      id:
        type: integer
      is_main:
        type: boolean
      product_id:
        type: integer
      sort_order:
        type: integer
      url_image:
        type: string
      variant_id:
        type: integer
    type: object
  internal_modules_products.ProductVariant:
    properties:
      attribute:
        allOf:
        - $ref: '#/definitions/internal_modules_products.ProductVariantAttribute'
        description: Relaciones
      created_at:
        type: string
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/internal_modules_products.ProductImage'
        type: array
      price:
        type: number
      product_id:
        type: integer
      reserved:
        description: Reservado en compras/checkout
        type: integer
      sku:
        type: string
      stock:
        type: integer
    type: object
  internal_modules_products.ProductVariantAttribute:
    properties:
      color:
        type: string
      id:
        type: integer
      size:
        type: string
      variant_id:
        type: integer
      weight:
        type: string
    type: object
  internal_modules_products.ProductVariantAttributeResponse:
    properties:
      color:
        type: string
      size:
        type: string
      weight:
        type: string
    type: object
  internal_modules_products.ProductVariantResponse:
    properties:
      attribute:
        $ref: '#/definitions/internal_modules_products.ProductVariantAttributeResponse'
      available:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/internal_modules_products.ProductImageResponse'
        type: array
      price:
        type: number
      product_id:
        type: integer
      reserved:
        type: integer
      sku:
        type: string
      stock:
        type: integer
    type: object
  internal_modules_products.UpdateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      parent_id:
        type: integer
      slug:
        type: string
    type: object
  internal_modules_products.UpdateProductImageRequest:
    properties:
      is_main:
        type: boolean
      sort_order:
        type: integer
      url_image:
        type: string
    type: object
  internal_modules_products.UpdateProductRequest:
    properties:
      base_price:
        type: number
      brand:
        type: string
      category_id:
        type: integer
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      slug:
        type: string
    type: object
  internal_modules_products.UpdateProductVariantRequest:
    properties:
      color:
        type: string
      price:
        type: number
      size:
        type: string
      sku:
        type: string
      stock:
        type: integer
      weight:
        type: string
    type: object
  internal_modules_users.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      surname:
        type: string
    required:
    - email
    - name
    - password
    type: object
  internal_modules_users.UpdateUserRequest:
    properties:
      active:
        type: boolean
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
    type: object
  internal_modules_users.UserResponse:
    properties:
      active:
        type: boolean
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      phone:
        type: string
      role:
        type: string
    type: object
info:
  contact:
    email: support@bey.com
    name: API Support
  description: E-commerce REST API with products, categories, orders, users, and inventory
    management
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Bey API
  version: "1.0"
paths:
  /api/v1/admin/users:
    post:
      consumes:
      - application/json
      description: Creates a new user account. Requires admin role.
      parameters:
      - description: User creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            allOf:
            - $ref: '#/definitions/bey_internal_shared_response.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.UserResponse'
              type: object
        "400":
          description: Bad request - invalid user data or email already exists
          schema:
            $ref: '#/definitions/bey_internal_shared_response.ApiResponse'
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            $ref: '#/definitions/bey_internal_shared_response.ApiResponse'
        "403":
          description: Forbidden - admin role required
          schema:
            $ref: '#/definitions/bey_internal_shared_response.ApiResponse'
        "500":
          description: Internal server error - user creation failed
          schema:
            $ref: '#/definitions/bey_internal_shared_response.ApiResponse'
      security:
      - BearerAuth: []
      summary: Create a new user (admin only)
      tags:
      - Admin
  /api/v1/auth/2fa/disable:
    post:
      consumes:
      - application/json
      description: Disable two-factor authentication (requires auth)
      parameters:
      - description: TOTP code or backup code
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.TwoFADisableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Disable 2FA
      tags:
      - Auth
  /api/v1/auth/2fa/enable:
    post:
      consumes:
      - application/json
      description: Enable two-factor authentication with code (requires auth)
      parameters:
      - description: TOTP code
        in: body
        name: code
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.TwoFAEnableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TwoFAEnableResponse'
      security:
      - BearerAuth: []
      summary: Enable 2FA
      tags:
      - Auth
  /api/v1/auth/2fa/login-verify:
    post:
      consumes:
      - application/json
      description: Verify 2FA during login with temp token
      parameters:
      - description: Temp token and TOTP code
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.TwoFALoginVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.LoginResponse'
      summary: Login with 2FA
      tags:
      - Auth
  /api/v1/auth/2fa/setup:
    post:
      consumes:
      - application/json
      description: Setup two-factor authentication (requires auth)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TwoFASetupResponse'
      security:
      - BearerAuth: []
      summary: Setup 2FA
      tags:
      - Auth
  /api/v1/auth/2fa/verify:
    post:
      consumes:
      - application/json
      description: Verify two-factor authentication code (requires auth)
      parameters:
      - description: TOTP code
        in: body
        name: code
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.TwoFAVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TwoFAVerifyResponse'
      security:
      - BearerAuth: []
      summary: Verify 2FA
      tags:
      - Auth
  /api/v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset email
      parameters:
      - description: Email address
        in: body
        name: email
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Forgot password
      tags:
      - Auth
  /api/v1/auth/google:
    get:
      description: Initiate Google OAuth2 login flow
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.OAuthRedirectResponse'
      summary: Google OAuth login
      tags:
      - Auth
  /api/v1/auth/google/callback:
    get:
      description: Handle Google OAuth2 callback
      parameters:
      - description: OAuth state
        in: query
        name: state
        required: true
        type: string
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.LoginResponse'
      summary: Google OAuth callback
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.LoginResponse'
      summary: User login
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: Logout user and clear cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      description: Refresh access token using refresh token cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
      summary: Refresh token
      tags:
      - Auth
  /api/v1/auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Resend verification email to user
      parameters:
      - description: Email address
        in: body
        name: email
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Resend verification email
      tags:
      - Auth
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using token from email
      parameters:
      - description: Token and new password
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reset password
      tags:
      - Auth
  /api/v1/auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verify user email with token
      parameters:
      - description: Verification token
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Verify email
      tags:
      - Auth
  /api/v1/cart:
    delete:
      consumes:
      - application/json
      description: Removes all items from the authenticated user's shopping cart
      produces:
      - application/json
      responses:
        "200":
          description: Cart cleared successfully
          schema:
            $ref: '#/definitions/bey_internal_shared_response.ApiResponse'
        "401":
          description: Unauthorized - invalid or missing token
