version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=luifer
      - DB_PASSWORD=158365402luifer
      - DB_NAME=bey_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bey_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: luifer
      POSTGRES_PASSWORD: 158365402luifer
      POSTGRES_DB: bey_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luifer"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bey_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bey_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  bey_network:
    driver: bridge
