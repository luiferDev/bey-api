services:
  postgres:
    image: postgres:17-alpine
    container_name: bey_postgres
    environment:
      POSTGRES_USER: bey_user
      POSTGRES_PASSWORD: bey_password
      POSTGRES_DB: bey_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bey_user -d bey_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: bey_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bey_api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bey_user
      DB_PASSWORD: bey_password
      DB_NAME: bey_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./
          target: /app
          ignore:
            - .git/
            - vendor/
            - .idea/
            - .vscode/
            - cmd/api/docs/
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./docker-compose.yml
        - action: rebuild
          path: ./cmd/api/docs/
        - action: rebuild
          path: ./cmd/api/docs/

volumes:
  postgres_data:
  redis_data:
