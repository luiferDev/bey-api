services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bey_postgres
    environment:
      POSTGRES_DB: bey_db
      POSTGRES_USER: bey_user
      POSTGRES_PASSWORD: bey_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bey_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bey_user -d bey_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bey_api
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=bey_user
      - DB_PASSWORD=bey_password
      - DB_NAME=bey_db
      - DB_SSLMODE=disable
      - PORT=8080
      - GIN_MODE=release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bey_network
    restart: unless-stopped

  # Redis (opcional para cache)
  redis:
    image: redis:7-alpine
    container_name: bey_redis
    ports:
      - "6379:6379"
    networks:
      - bey_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bey_network:
    driver: bridge