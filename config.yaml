app:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  static_path: "./cmd/api/static"
  swagger_enabled: true
  admin_email: "admin@bey.com"
  admin_password: ""  # Override with ADMIN_PASSWORD env var

database:
  host: "postgres"
  port: 5432
  user: "bey_user"
  password: ""  # Override with DB_PASSWORD env var
  name: "bey_db"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

concurrency:
  worker_pool:
    worker_pool_size: 4
    queue_depth_limit: 100
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst_capacity: 200
    endpoint_limits: {}

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  jwt_secret: ""  # Override with JWT_SECRET env var (min 32 chars)
  jwt_expiry_hours: 2
  jwt_access_expiry: "15m"
  jwt_refresh_expiry: "168h"
  jwt_issuer: "bey_api"
  jwt_algorithm: "HS256"
  csrf_enabled: true

rate_limit:
  enabled: true
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    password: ""
    db: 0
  defaults:
    requests_per_minute: 60
    burst_capacity: 10
  endpoints:
    /api/v1/auth/login:
      requests_per_minute: 5
      burst_capacity: 2
    /api/v1/auth/refresh:
      requests_per_minute: 10
      burst_capacity: 3
    /api/v1/admin:
      requests_per_minute: 60
      burst_capacity: 10
    /api/v1/auth/forgot-password:
      requests_per_minute: 3
      burst_capacity: 1
    /api/v1/auth/reset-password:
      requests_per_minute: 5
      burst_capacity: 2

email:
  enabled: true
  from_name: "Bey API"
  from_email: "noreply@beyapi.com"
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: ""  # Override with SMTP_USERNAME env var
    password: ""  # Override with SMTP_PASSWORD env var

oauth:
  google:
    client_id: ""     # Override with GOOGLE_OAUTH_CLIENT_ID env var
    client_secret: "" # Override with GOOGLE_OAUTH_CLIENT_SECRET env var
    redirect_url: "http://localhost:8080/api/v1/auth/google/callback"

cart:
  enabled: true
  redis:
    host: "redis"
    port: 6379
    password: ""
    db: 1
  ttl_days: 7

wompi:
  enabled: true
  environment: "sandbox"
  public_key: ""    # Override with WOMPI_PUBLIC_KEY env var
  private_key: ""   # Override with WOMPI_PRIVATE_KEY env var
  event_key: ""     # Override with WOMPI_EVENT_KEY env var
  integrity_key: "" # Override with WOMPI_INTEGRITY_KEY env var
  base_url: "https://sandbox.wompi.co"

cache:
  enabled: true
  db: 2
  default_ttl: 28800
  warming_enabled: true
  warming_product_limit: 100
