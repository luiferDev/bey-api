app:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  static_path: "./cmd/api/static"
  swagger_enabled: true
  admin_email: ""
  admin_password: ""

database:
  host: ""
  port: 5432
  user: ""
  password: ""
  name: ""
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

concurrency:
  worker_pool:
    worker_pool_size: 4
    queue_depth_limit: 100
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst_capacity: 200
    endpoint_limits: {}

security:
  allowed_origins: []
  jwt_secret: ""
  jwt_expiry_hours: 0
  jwt_issuer: ""
  jwt_algorithm: ""
  csrf_enabled: true

rate_limit:
  enabled: true
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    password: ""
    db: 0
  defaults:
    requests_per_minute: 60
    burst_capacity: 10
  endpoints:
    /api/v1/auth/login:
      requests_per_minute: 5
      burst_capacity: 2
    /api/v1/auth/refresh:
      requests_per_minute: 10
      burst_capacity: 3
    /api/v1/admin:
      requests_per_minute: 60
      burst_capacity: 10
    /api/v1/auth/forgot-password:
      requests_per_minute: 3
      burst_capacity: 1
    /api/v1/auth/reset-password:
      requests_per_minute: 5
      burst_capacity: 2

email:
  enabled: true
  from_name: ""
  from_email: ""
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""

oauth:
  google:
    client_id: ""
    client_secret: ""
    redirect_url: ""

cart:
  enabled: true
  redis:
    host: "redis"
    port: 6379
    password: ""
    db: 1
  ttl_days: 7

wompi:
  enabled: true
  environment: ""
  public_key: ""
  private_key: ""
  event_key: ""
  integrity_key: ""
  base_url: ""

cache:
  enabled: true
  db: 2
  default_ttl: 28800
  warming_enabled: true
  warming_product_limit: 100
